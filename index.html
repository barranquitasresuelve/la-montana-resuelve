<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>La Montaña Resuelve - Directorio de Servicios</title>
    <style>
        body { font-family: Arial, sans-serif; margin: 0; background: #f4f4f4; }
      .header { background: #2c5f2d; color: white; padding: 20px; text-align: center; }
      .container { max-width: 1200px; margin: 0 auto; padding: 20px; }
      .btn-registro { 
            display: block; width: 90%; max-width: 300px; margin: 20px auto; 
            padding: 15px; background: #ff6b35; color: white; text-align: center; 
            text-decoration: none; border-radius: 8px; font-weight: bold; font-size: 18px;
        }
      .negocio { background: white; padding: 15px; margin: 10px 0; border-radius: 8px; box-shadow: 0 2px 5px rgba(0,0,0,0.1); }
      .whatsapp { background: #25D366; color: white; padding: 8px 12px; text-decoration: none; border-radius: 5px; display: inline-block; margin-top: 10px; }
    </style>
</head>
<body>
    <div class="header">
        <h1>🏔️ La Montaña Resuelve</h1>
        <p>Directorio de Servicios de Barranquitas, PR</p>
    </div>
    <div class="container">
        <a href="https://docs.google.com/forms/d/e/1FAIpQLScPm8hrgftEpNIgTon3Z7dABIziWXfS1yLPoHVlowlq2WpmSg/viewform" target="_blank" class="btn-registro">
            ➕ REGISTRA TU NEGOCIO GRATIS
        </a>
        <div id="directorio">Cargando negocios...</div>
    </div>

    <script>
        const SHEET_URL = 'https://docs.google.com/spreadsheets/d/e/2PACX-1vS6SiGeP2YhPe6X8InDjvW6FeTYDtB9yDGfXy-P86oyqJ-k5De0UIIvHr8Sw9J3O2DNf2K5TwTUYk/pub?gid=1194826649&single=true&output=csv';
        
        fetch(SHEET_URL)
          .then(response => response.text())
          .then(data => {
                const rows = data.split('\n').slice(1);
                let html = '';
                rows.forEach(row => {
                    const cols = row.split(',');
                    if(cols[1] && cols[1].trim()!== '') {
                        html += `
                            <div class="negocio">
                                <h3>${cols[1]}</h3>
                                <p><strong>Categoría:</strong> ${cols[3] || 'General'}</p>
                                <p>${cols[4] || ''}</p>
                                <a href="https://wa.me/1${cols[2]}" class="whatsapp" target="_blank">💬 WhatsApp</a>
                            </div>
                        `;
                    }
                });
                document.getElementById('directorio').innerHTML = html || 'Aún no hay negocios registrados. ¡Sé el primero!';
            })
          .catch(error => {
                document.getElementById('directorio').innerHTML = 'Error cargando el directorio. Refresca la página.';
            });
    </script>
</body>
</html>
