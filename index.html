<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>La Montaña Resuelve - Directorio de Servicios de Barranquitas Resuelve</title>
    <style>
        body { font-family: Arial, sans-serif; margin: 0; background: #f4f4f4; }
.header { background: #2c5f2d; color: white; padding: 20px; text-align: center; }
.container { max-width: 1200px; margin: 0 auto; padding: 20px; }
.btn-registro { 
            display: block; width: 90%; max-width: 300px; margin: 20px auto; 
            padding: 15px; background: #ff6b35; color: white; text-align: center; 
            text-decoration: none; border-radius: 8px; font-weight: bold; font-size: 18px;
        }
.negocio { background: white; padding: 15px; margin: 10px 0; border-radius: 8px; box-shadow: 0 2px 5px rgba(0,0,0,0.1); }
.whatsapp { background: #25D366; color: white; padding: 8px 12px; text-decoration: none; border-radius: 5px; display: inline-block; margin: 5px 5px 0 0; }
.telefono { background: #007bff; color: white; padding: 8px 12px; text-decoration: none; border-radius: 5px; display: inline-block; margin: 5px 5px 0 0; }
.pueblo { color: #2c5f2d; font-weight: bold; margin: 5px 0; }
.dueno { color: #666; font-size: 14px; margin: 5px 0; }
.footer { text-align: center; padding: 20px; color: #666; font-size: 14px; }
.contador { text-align: center; margin: 10px 0; font-weight: bold; color: #2c5f2d; }
    </style>
</head>
<body>
    <div class="header">
        <h1>🏔️ La Montaña Resuelve</h1>
        <p>Directorio de Servicios de Barranquitas Resuelve</p>
    </div>
    <div class="container">
        <a href="https://docs.google.com/forms/d/e/1FAIpQLScPm8hrgftEpNIgTon3Z7dABIziWXfS1yLPoHVlowlq2WpmSg/viewform" target="_blank" class="btn-registro">
            ➕ REGISTRA TU NEGOCIO GRATIS
        </a>
        <div id="contador" class="contador"></div>
        <div id="directorio">Cargando negocios...</div>
    </div>
    <div class="footer">
        Hecho con ❤️ para Barranquitas | La Montaña Resuelve 2026
    </div>

    <script>
        const SHEET_CSV = 'https://docs.google.com/spreadsheets/d/e/2PACX-1vS65iGePl2YHPeeX81nDjvW6FeTYDtB9yDGfXy-P86oyqJ-k5De0UIlmvH8Sw9J30ZDNnf2KSTwTUYK/pub?gid=1194828649&single=true&output=csv';
        
        async function cargarNegocios() {
            const urls = [
                'https://api.allorigins.win/raw?url=' + encodeURIComponent(SHEET_CSV),
                'https://corsproxy.io/?' + encodeURIComponent(SHEET_CSV),
                SHEET_CSV
            ];
            
            for (let url of urls) {
                try {
                    const response = await fetch(url);
                    const data = await response.text();
                    if (data.includes('Nombre del Negocio')) {
                        mostrarNegocios(data);
                        return;
                    }
                } catch (e) {
                    console.log('Intento falló, probando siguiente...');
                }
            }
            document.getElementById('directorio').innerHTML = 'Error cargando. Refresca con Ctrl+F5';
        }
        
        function mostrarNegocios(data) {
            const rows = data.split('\n');
            const headers = rows[0].split(',').map(h => h.replace(/^"|"$/g, '').trim());
            console.log('Columnas detectadas:', headers);
            
            // Busca automático en qué columna está cada cosa
            const idxNombre = headers.indexOf('Nombre del Negocio');
            const idxDueno = headers.indexOf('Nombre del Dueño/Contacto');
            const idxPueblo = headers.indexOf('Pueblo');
            const idxCategoria = headers.indexOf('Categoría Principal');
            const idxServicios = headers.indexOf('¿Qué servicios ofreces?');
            const idxTelefono = headers.indexOf('Teléfono principal');
            const idxWhatsapp = headers.indexOf('WhatsApp');
            
            console.log('Índices:', {idxNombre, idxDueno, idxPueblo, idxCategoria, idxServicios, idxTelefono, idxWhatsapp});
            
            let html = '';
            let contador = 0;
            let saltados = 0;
            
            rows.slice(1).forEach(row => {
                const cols = row.match(/(".*?"|[^",]+)(?=\s*,|\s*$)/g) || [];
                const c = cols.map(col => col.replace(/^"|"$/g, '').trim());
                
                let nombre = c[idxNombre] || '';
                const dueno = c[idxDueno] || '';
                const pueblo = c[idxPueblo] || '';
                const categoria = c[idxCategoria] || '';
                const servicios = c[idxServicios] || '';
                const telefonoRaw = c[idxTelefono] || '';
                const whatsappRaw = c[idxWhatsapp] || '';
                
                const telefono = telefonoRaw.replace(/\D/g,'');
                const whatsapp = whatsappRaw.replace(/\D/g,'');
                
                // Si no hay nombre de negocio, usa el del dueño
                if(!nombre || nombre === 'Por confirmar') {
                    nombre = dueno;
                }
                
                // REGLA ESTRICTA: Necesita nombre Y al menos un teléfono de 10 dígitos
                const tieneNombre = nombre && nombre.length > 2 &&!['Barranquitas','Corozal','Aibonito','Orocovis','Comerío','Naranjito','Todos','Área Central PR'].includes(nombre);
                const tieneTelefono = (telefono && telefono.length >= 10) || (whatsapp && whatsapp.length >= 10);
                
                if(tieneNombre && tieneTelefono) {
                    contador++;
                    html += `
                        <div class="negocio">
                            <h3>${nombre}</h3>
                            ${pueblo && pueblo!== 'Por confirmar'? `<p class="pueblo">📍 ${pueblo}</p>` : ''}
                            ${categoria? `<p><strong>Categoría:</strong> ${categoria}</p>` : ''}
                            ${servicios? `<p>${servicios}</p>` : ''}
                            ${dueno && dueno!== nombre && dueno!== 'Por confirmar'? `<p class="dueno"><strong>Contacto:</strong> ${dueno}</p>` : ''}
                            ${telefono? `<a href="tel:+1${telefono}" class="telefono">📞 ${telefonoRaw}</a>` : ''}
                            ${whatsapp? `<a href="https://wa.me/1${whatsapp}" class="whatsapp" target="_blank">💬 WhatsApp</a>` : ''}
                        </div>
                    `;
                } else {
                    saltados++;
                }
            });
            
            document.getElementById('contador').innerHTML = `Mostrando ${contador} negocios verificados. ${saltados} omitidos por falta de nombre o teléfono.`;
            document.getElementById('directorio').innerHTML = html || 'No hay negocios con información completa. ¡Registra el tuyo!';
        }
        
        cargarNegocios();
    </script>
</body>
</html>
