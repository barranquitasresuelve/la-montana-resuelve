<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>La Montaña Resuelve - Directorio de Servicios de Barranquitas Resuelve</title>
    <style>
        body { font-family: Arial, sans-serif; margin: 0; background: #f4f4f4; }
.header { background: #2c5f2d; color: white; padding: 20px; text-align: center; }
.container { max-width: 1200px; margin: 0 auto; padding: 20px; }
.btn-registro { 
            display: block; width: 90%; max-width: 300px; margin: 20px auto; 
            padding: 15px; background: #ff6b35; color: white; text-align: center; 
            text-decoration: none; border-radius: 8px; font-weight: bold; font-size: 18px;
        }
.negocio { background: white; padding: 15px; margin: 10px 0; border-radius: 8px; box-shadow: 0 2px 5px rgba(0,0,0,0.1); }
.whatsapp { background: #25D366; color: white; padding: 8px 12px; text-decoration: none; border-radius: 5px; display: inline-block; margin: 5px 5px 0 0; }
.telefono { background: #007bff; color: white; padding: 8px 12px; text-decoration: none; border-radius: 5px; display: inline-block; margin: 5px 5px 0 0; }
.pueblo { color: #2c5f2d; font-weight: bold; margin: 5px 0; }
.dueno { color: #666; font-size: 14px; margin: 5px 0; }
.footer { text-align: center; padding: 20px; color: #666; font-size: 14px; }
    </style>
</head>
<body>
    <div class="header">
        <h1>🏔️ La Montaña Resuelve</h1>
        <p>Directorio de Servicios de Barranquitas Resuelve</p>
    </div>
    <div class="container">
        <a href="https://docs.google.com/forms/d/e/1FAIpQLScPm8hrgftEpNIgTon3Z7dABIziWXfS1yLPoHVlowlq2WpmSg/viewform" target="_blank" class="btn-registro">
            ➕ REGISTRA TU NEGOCIO GRATIS
        </a>
        <div id="directorio">Cargando negocios...</div>
    </div>
    <div class="footer">
        Hecho con ❤️ para Barranquitas | La Montaña Resuelve 2026
    </div>

    <script>
        const SHEET_CSV = 'https://docs.google.com/spreadsheets/d/e/2PACX-1vS65iGePl2YHPeeX81nDjvW6FeTYDtB9yDGfXy-P86oyqJ-k5De0UIlmvH8Sw9J30ZDNnf2KSTwTUYK/pub?gid=1194828649&single=true&output=csv';
        
        async function cargarNegocios() {
            const urls = [
                'https://api.allorigins.win/raw?url=' + encodeURIComponent(SHEET_CSV),
                'https://corsproxy.io/?' + encodeURIComponent(SHEET_CSV),
                SHEET_CSV
            ];
            
            for (let url of urls) {
                try {
                    const response = await fetch(url);
                    const data = await response.text();
                    if (data.includes('Prueb') || data.includes('Bqtas') || data.includes('Nombre')) {
                        mostrarNegocios(data);
                        return;
                    }
                } catch (e) {
                    console.log('Intento falló, probando siguiente...');
                }
            }
            document.getElementById('directorio').innerHTML = 'Error cargando. Refresca con Ctrl+F5';
        }
        
        function mostrarNegocios(data) {
            const rows = data.split('\n').slice(1); // Salta la fila de títulos
            let html = '';
            let contador = 0;
            
            rows.forEach(row => {
                const cols = row.match(/(".*?"|[^",]+)(?=\s*,|\s*$)/g) || [];
                const c = cols.map(col => col.replace(/^"|"$/g, '').trim());
                
                // Tu orden real de columnas:
                // 0:Timestamp | 1:Nombre Negocio | 2:Dueño | 3:Pueblo | 4:Categoría | 5:Servicios | 6:Teléfono | 7:WhatsApp
                const nombre = c[1];
                const dueno = c[2];
                const pueblo = c[3];
                const categoria = c[4];
                const servicios = c[5];
                const telefono = c[6]? c[6].replace(/\D/g,'') : '';
                const whatsapp = c[7]? c[7].replace(/\D/g,'') : '';
                
                // REGLA #1: Si no hay nombre de negocio, SALTA la fila completa
                // REGLA #2: Si dice "Categoría Principal" o "Nombre del Negocio", también la salta
                if(!nombre || nombre === '' || nombre === 'Nombre del Negocio' || nombre === 'Categoría Principal' || nombre === 'Por confirmar') {
                    return; // No mostrar esta fila
                }
                
                contador++;
                html += `
                    <div class="negocio">
                        <h3>${nombre}</h3>
                        ${pueblo && pueblo!== 'Por confirmar'? `<p class="pueblo">📍 ${pueblo}</p>` : ''}
                        ${categoria? `<p><strong>Categoría:</strong> ${categoria}</p>` : ''}
                        ${servicios? `<p>${servicios}</p>` : ''}
                        ${dueno && dueno!== 'Por confirmar'? `<p class="dueno"><strong>Contacto:</strong> ${dueno}</p>` : ''}
                        ${telefono? `<a href="tel:+1${telefono}" class="telefono">📞 ${c[6]}</a>` : ''}
                        ${whatsapp? `<a href="https://wa.me/1${whatsapp}" class="whatsapp" target="_blank">💬 WhatsApp</a>` : ''}
                    </div>
                `;
            });
            
            document.getElementById('directorio').innerHTML = html || 'Aún no hay negocios registrados. ¡Sé el primero!';
            console.log(`Mostrando ${contador} negocios`);
        }
        
        cargarNegocios();
    </script>
</body>
</html>
