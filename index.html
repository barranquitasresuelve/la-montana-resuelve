<html lang="es">

  var origAdd = EventTarget.prototype.addEventListener;
  var blockedTypes = { touchstart: 1, touchmove: 1, wheel: 1 };
  EventTarget.prototype.addEventListener = function(type, listener, options) {
    if (blockedTypes[type]) {
      if (options === undefined || options === null) {
        options = { passive: true };
      } else if (typeof options === 'boolean') {

<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>La Montaña Resuelve | Directorio del Centro de P.R.</title>
<style>
body{font-family:Arial,sans-serif;background:#f5f7fa;margin:0;color:#1b2a4a}
header{background:#1b2a4a;color:white;text-align:center;padding:30px 15px}
header h1{margin:0;font-size:2rem} header h1 span{color:#d4ac5a}
.container{max-width:1000px;margin:20px auto;padding:0 15px}
.filters{display:flex;gap:10px;margin-bottom:20px;flex-wrap:wrap}
.filters select,.filters input{padding:10px;border:1px solid #c7d2f0;border-radius:8px;font-size:1rem}
.grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(300px,1fr));gap:15px}
.card{background:white;border:1px solid #e8dfc8;border-radius:12px;padding:16px}
.card h3{margin:0 0 5px 0;font-size:1.1rem}
.muni{background:#eef2ff;color:#2e4480;font-size:.75rem;padding:3px 8px;border-radius:100px;display:inline-block;margin-bottom:8px}
.desc{font-size:.9rem;color:#5a6a8a;margin:8px 0}
.btn{display:inline-block;background:#22c55e;color:white;padding:8px 12px;border-radius:7px;text-decoration:none;font-weight:700;font-size:.9rem}
.btn-call{background:#1b2a4a;margin-right:6px}
.loading{text-align:center;padding:40px;color:#5a6a8a}
</style>
</head>
<body>
<header>
  <h1>La Montaña <span>Resuelve</span></h1>
  <p>Directorio Fijo del Centro de Puerto Rico</p>
</header>
<div class="container">
  <div class="filters">
    <input type="text" id="buscar" placeholder="Buscar servicio: plomero, comida...">
    <select id="pueblo"><option value="">Todos los pueblos</option><option>Barranquitas</option><option>Aibonito</option><option>Orocovis</option><option>Comerío</option><option>Corozal</option><option>Naranjito</option></select>
    <select id="categoria"><option value="">Todas las categorías</option><option>Construcción y Mantenimiento</option><option>Mantenimiento de Casas</option><option>Limpieza</option><option>Áreas Verdes</option><option>Gastronomía</option><option>Salud</option><option>Mecánica</option><option>Profesionales</option><option>Especializados</option><option>Eventos</option><option>Comercio</option></select>
  </div>
  <div id="resultados" class="grid"><p class="loading">Cargando negocios...</p></div>
</div>
<script>
const SHEET_API = 'https://script.google.com/macros/s/AKfycbzyaPp5R4uI3lWz4iB5kI4iWbQJ1uO5J8Y1dV5QeY2/exec';

// Parser de CSV que respeta comillas y comas
function parseCSV(text) {
  const rows = [];
  let row = [];
  let cell = '';
  let inQuotes = false;
  for (let i = 0; i < text.length; i++) {
    const char = text[i];
    const next = text[i+1];
    if (char === '"' && inQuotes && next === '"') { cell += '"'; i++; }
    else if (char === '"') { inQuotes = !inQuotes; }
    else if (char === ',' && !inQuotes) { row.push(cell); cell = ''; }
    else if ((char === '\n' || char === '\r') && !inQuotes) {
      if (cell || row.length) { row.push(cell); rows.push(row); row = []; cell = ''; }
      if (char === '\r' && next === '\n') i++;
    } else { cell += char; }
  }
  if (cell || row.length) { row.push(cell); rows.push(row); }
  return rows;
}

function limpiarTelefono(tel) {
  if (!tel) return '';
  return tel.replace(/[^0-9]/g, ''); // Solo deja números
}

function crearWhatsAppLink(tel) {
  const limpio = limpiarTelefono(tel);
  if (!limpio) return '';
  // Añade 1 si es número de PR/USA de 10 dígitos
  const conCodigo = limpio.length === 10 ? '1' + limpio : limpio;
  return `https://wa.me/${conCodigo}`;
}

async function cargarData(){
  try {
    const res = await fetch(SHEET_API);
    const data = await res.text();
    const rows = parseCSV(data).slice(1).filter(r => r[0]); // Filtra filas vacías
    window.negocios = rows.map(c => {
      const tel = c[8] || '';
      const wa = c[10] || crearWhatsAppLink(tel);
      return { 
        nombre: c[0]||'', 
        dueno: c[1]||'', 
        pueblo: c[2]||'', 
        categoria: c[4]||'', 
        servicios: c[6]||'', 
        tel: limpiarTelefono(tel), 
        wa: wa 
      };
    }).filter(n => n.nombre);
    mostrar();
  } catch(e) { 
    document.getElementById('resultados').innerHTML = '<p>Error cargando datos. Verifica el Google Sheet.</p>';
    console.error(e);
  }
}

function mostrar(){
  const b = document.getElementById('buscar').value.toLowerCase();
  const p = document.getElementById('pueblo').value;
  const c = document.getElementById('categoria').value;
  const html = window.negocios.filter(n => 
    (!b || n.nombre.toLowerCase().includes(b) || n.servicios.toLowerCase().includes(b)) && 
    (!p || n.pueblo.includes(p)) && 
    (!c || n.categoria.includes(c))
  ).map(n => `
    <div class="card">
      <span class="muni">${n.pueblo || 'Por confirmar'}</span>
      <h3>${n.nombre}</h3>
      ${n.dueno? `<p style="font-size:.8rem;color:#5a6a8a;margin:0 0 8px 0">${n.dueno}</p>` : ''}
      <p class="desc">${n.servicios}</p>
      ${n.tel? `<a class="btn btn-call" href="tel:${n.tel}">📞 Llamar</a>` : ''}
      ${n.wa && n.wa.includes('wa.me')? `<a class="btn" href="${n.wa}" target="_blank">💬 WhatsApp</a>` : ''}
    </div>
  `).join('');
  document.getElementById('resultados').innerHTML = html || '<p>No hay resultados.</p>';
}

document.getElementById('buscar').oninput = mostrar;
document.getElementById('pueblo').onchange = mostrar;
document.getElementById('categoria').onchange = mostrar;
cargarData();
</script>
</body>
</html>
